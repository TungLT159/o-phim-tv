    <!-- Inline critical CSS to prevent white flash -->
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #050608;
        background: linear-gradient(135deg, #050608 0%, #101018 48%, #020204 100%);
      }

      #root {
        width: 100%;
        height: 100%;
        background: transparent;
      }

      /* Fallback splash screen nếu JS chưa load */
      #root:empty::before {
        content: '';
        position: fixed;
        inset: 0;
        background:
          radial-gradient(circle at center, rgba(231, 47, 47, 0.22), transparent 36rem),
          radial-gradient(circle at 50% 45%, rgba(255, 190, 92, 0.14), transparent 22rem),
          linear-gradient(135deg, #050608 0%, #101018 48%, #020204 100%);
        z-index: 9999;
      }
    </style>
